<template name="account_ident_panel">
    <div class="am-account-ident-panel">

        <table class="form-table">
            <tr>
                <td class="ui-w30 label"><label class="form-label" for="ident-tab-allowed">{{ i18n key="panel.login_allowed_label" }}</label></td>
                <td class=""><input class="form-check-input js-login-allowed" type="checkbox" id="ident-tab-allowed" /></td>
                <td class="ui-w30 label"><label class="form-label" for="ident-tab-last-login">{{ i18n key="panel.last_login_label" }}</label></td>
                <td class="ui-w30"><input class="form-control forms-readonly forms-stamp js-last-login" type="text" id="ident-tab-last-login" readonly /></td>
            </tr>
            {{#if havePadderTopRow }}
                {{> Template.dynamic template=(toprowTemplate) data=(toprowData) }}
            {{/if}}
            <tr class="am-tr-padder am-tr-padder-top"><td colspan="4"></td></tr>
            <tr class="am-tr-padder am-tr-padder-bottom"><td colspan="4"></td></tr>
            {{#if newAccount }}
                <tr>
                    <td></td>
                    <td colspan="3">
                        {{> acUserLogin (parmsUserLoginNew) }}
                    </td>
                </tr>
            {{else}}
                {{#if haveUsername}}
                    <tr>
                        <td class="label"><label class="form-label" for="ident-tab-username">{{ i18n key="panel.username_label" }}</label></td>
                        <td class="ui-w100" colspan="3"><input class="form-control js-username" type="text" id="ident-tab-username" placeholder="{{ i18n key="panel.username_ph" }}" /></td>
                    </tr>
                {{/if}}
                {{#if haveEmailAddress }}
                    <tr>
                        <td class="ui-w100" colspan="4">
                            {{> account_emails_list }}
                        </td>
                    </tr>
                {{/if}}
            {{/if}}
        </table>

    </div>
</template>
